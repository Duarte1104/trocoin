<ion-content [fullscreen]="true" class="register-content">

  <div class="register-container">

    <div class="top-area">
      <ion-button fill="clear" class="back-button" (click)="voltar()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>

      <div class="brand-small">
        trocoin<span>•</span>
      </div>
    </div>

    <div class="title-area">
      <h1>Criar conta</h1>
      <p>Cria o teu perfil de colecionador</p>
    </div>

    <div class="form-card">

      <ion-label>Nome completo</ion-label>
      <ion-input
        type="text"
        placeholder="João Silva"
        [(ngModel)]="nome"
        class="custom-input">
      </ion-input>

      <ion-label>Email</ion-label>
      <ion-input
        type="email"
        placeholder="exemplo@gmail.com"
        [(ngModel)]="email"
        class="custom-input">
      </ion-input>

      <ion-label>Palavra-passe</ion-label>
      <ion-input
        [type]="mostrarSenha ? 'text' : 'password'"
        placeholder="Mínimo 6 caracteres"
        [(ngModel)]="senha"
        class="custom-input">

        <ion-button fill="clear" slot="end" class="eye-button" (click)="alternarVisibilidadeSenha()">
          <ion-icon [name]="mostrarSenha ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>

      </ion-input>

      <ion-label>Confirmar palavra-passe</ion-label>
      <ion-input
        [type]="mostrarSenha ? 'text' : 'password'"
        placeholder="Repetir palavra-passe"
        [(ngModel)]="confirmarSenha"
        class="custom-input">
      </ion-input>

      <div class="terms-area">
        <ion-checkbox [(ngModel)]="termosAceites"></ion-checkbox>

        <p>
          Aceito os
          <button type="button" (click)="abrirTermos()">
            termos e condições
          </button>
        </p>
      </div>

      <ion-button expand="block" class="main-button" (click)="criarConta()">
        Criar conta
      </ion-button>

    </div>

  </div>

</ion-content>
