<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="voltar()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Propor troca</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="page-content">

  <div class="loading-area" *ngIf="carregando">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div class="wrapper" *ngIf="!carregando && anuncio as a">

    <!-- Card do anúncio -->
    <div class="ad-card">
      <img [src]="obterImagemPrincipal()" [alt]="a.titulo">
      <div class="ad-card-info">
        <p class="ad-card-title">{{ a.titulo }}</p>
        <p class="ad-card-price">{{ formatarPreco(a.preco) }}</p>
        <p class="ad-card-seller" *ngIf="vendedor">
          <ion-icon name="person-outline"></ion-icon>
          {{ vendedor.nome }}
        </p>
      </div>
    </div>

    <!-- Seta de troca -->
    <div class="swap-arrow">
      <ion-icon name="swap-vertical-outline"></ion-icon>
      <span>A tua moeda</span>
    </div>

    <!-- Formulário -->
    <div class="form-card">

      <div class="field">
        <ion-label>Moeda que ofereces</ion-label>
        <ion-input type="text" [(ngModel)]="moedaOferecida" placeholder="Ex: 2€ Portugal 2002"></ion-input>
      </div>

      <div class="field">
        <ion-label>Estado da tua moeda</ion-label>
        <ion-select [(ngModel)]="estadoMoeda" interface="popover">
          <ion-select-option value="Excelente">Excelente</ion-select-option>
          <ion-select-option value="Muito Bom">Muito Bom</ion-select-option>
          <ion-select-option value="Bom">Bom</ion-select-option>
          <ion-select-option value="Razoável">Razoável</ion-select-option>
        </ion-select>
      </div>

      <div class="field">
        <ion-label>Mensagem ao vendedor (opcional)</ion-label>
        <ion-textarea rows="3" [(ngModel)]="descricaoTroca" placeholder="Ex: Tenho fotos se quiser ver."></ion-textarea>
      </div>

    </div>

    <div class="info-note">
      <ion-icon name="swap-horizontal-outline"></ion-icon>
      <p>A proposta será enviada ao vendedor pela conversa da app.</p>
    </div>

    <ion-button expand="block" class="main-button" (click)="enviarPropostaTroca()">
      <ion-icon name="swap-horizontal-outline" slot="start"></ion-icon>
      Enviar proposta de troca
    </ion-button>

  </div>

</ion-content>
