<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="voltar()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Propor compra</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="page-content">

  <div class="loading-area" *ngIf="carregando">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div class="wrapper" *ngIf="!carregando && anuncio as a">

    <!-- Card do anúncio -->
    <div class="ad-card">
      <img [src]="obterImagemPrincipal()" [alt]="a.titulo">
      <div class="ad-card-info">
        <p class="ad-card-title">{{ a.titulo }}</p>
        <p class="ad-card-price">{{ formatarPreco(a.preco) }}</p>
        <p class="ad-card-seller" *ngIf="vendedor">
          <ion-icon name="person-outline"></ion-icon>
          {{ vendedor.nome }}
        </p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="form-card">

      <div class="field">
        <ion-label>Valor proposto (€)</ion-label>
        <ion-input type="number" [(ngModel)]="valorProposto" placeholder="Ex: 14"></ion-input>
      </div>

      <div class="field">
        <ion-label>Método de pagamento</ion-label>
        <ion-select [(ngModel)]="metodoPagamento" interface="popover">
          <ion-select-option value="MB Way">MB Way</ion-select-option>
          <ion-select-option value="Transferência bancária">Transferência bancária</ion-select-option>
          <ion-select-option value="Pagamento presencial">Pagamento presencial</ion-select-option>
          <ion-select-option value="A combinar">A combinar</ion-select-option>
        </ion-select>
      </div>

      <div class="field">
        <ion-label>Observações (opcional)</ion-label>
        <ion-textarea rows="3" [(ngModel)]="observacoes" placeholder="Ex: Posso pagar hoje."></ion-textarea>
      </div>

    </div>

    <div class="info-note">
      <ion-icon name="information-circle-outline"></ion-icon>
      <p>A proposta será enviada ao vendedor pela conversa da app.</p>
    </div>

    <ion-button expand="block" class="main-button" (click)="enviarPropostaCompra()">
      <ion-icon name="card-outline" slot="start"></ion-icon>
      Enviar proposta de compra
    </ion-button>

  </div>

</ion-content>
